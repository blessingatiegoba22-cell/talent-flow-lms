# render.yaml — Infrastructure-as-code for Render
# Docs: https://render.com/docs/yaml-spec
#
# Commit this file to your repo. Render reads it automatically
# when you connect your repository.

services:
  - type: web
    name: talentflow-api
    runtime: python
    region: oregon          # options: oregon, frankfurt, singapore, ohio, virginia
    plan: free              # upgrade to "starter" ($7/mo) for always-on + SLA
    branch: main

    buildCommand: pip install -r requirements.txt && alembic upgrade head && python scripts/create_sample_courses.py
    startCommand: gunicorn app.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --log-level info

    healthCheckPath: /health

    envVars:
      # Render injects PORT automatically — never set it manually here
      - key: ENVIRONMENT
        value: production

      - key: SECRET_KEY
        generateValue: true     # Render auto-generates a cryptographically secure value

      - key: ALGORITHM
        value: HS256

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"

      # !! Replace with your real frontend URL before deploying !!
      - key: ALLOWED_ORIGINS
        value: https://your-frontend.onrender.com

      # Render PostgreSQL injects DATABASE_URL automatically via fromDatabase
      - key: DATABASE_URL
        fromDatabase:
          name: talentflow-db
          property: connectionString

      - key: FIRST_ADMIN_EMAIL
        value: admin@talentflow.com

      # sync: false → Render prompts you to enter this securely, never stores in YAML
      - key: FIRST_ADMIN_PASSWORD
        sync: false

databases:
  - name: talentflow-db
    databaseName: talent_flow_db
    user: talentflow
    region: oregon            # must match service region above
    plan: free                # free tier: 1GB, 1 month retention, then upgrade

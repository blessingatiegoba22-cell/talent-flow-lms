version: '3.8'

services:
  talent-flow:
    container_name: talent_flow_api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '${FORWARD_API_PORT:-8001}:8000'
    environment:
      - DB_HOST=talent_flow_db
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-Password123!}
      - DB_DATABASE=${DB_DATABASE:-talent_flow_db}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here-change-in-production}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - FIRST_ADMIN_EMAIL=${FIRST_ADMIN_EMAIL:-admin@talentflow.com}
      - FIRST_ADMIN_PASSWORD=${FIRST_ADMIN_PASSWORD:-Password123!}
    depends_on:
      - talent_flow_db
    restart: unless-stopped


  talent_flow_db:
    container_name: talent_flow_db
    image: postgres:15                    # ← swap mysql for postgres
    environment:
      POSTGRES_USER: ${DB_USER}           # ← postgres variables
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - '${FORWARD_DB_PORT:-5433}:5432'
    volumes:
      - talent_flow_data:/var/lib/postgresql/data   # ← postgres data path
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
 
volumes:
  talent_flow_data:

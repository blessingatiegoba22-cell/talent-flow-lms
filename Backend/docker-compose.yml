# version: '3.9'

services:
  talent_flow.api:
    build: .
    container_name: talent_flow.api
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
      - JWT_SECRET_KEY=${SECRET_KEY}
      - JWT_EXPIRATION_TIME=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - JWT_ALGORITHM=${ALGORITHM}
    volumes:
      - ./.env:/app/.env
    # volumes:
    #   - ./app:/app
      # added other environment variables here
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - FIRST_ADMIN_EMAIL=${FIRST_ADMIN_EMAIL}
      - FIRST_ADMIN_PASSWORD=${FIRST_ADMIN_PASSWORD}
    volumes:
      # - ./app:/app - this only mounts the app subfolder and misses other crucial files to run the project
      - .:/app #this mounts the backend folder to the container
    depends_on:
      talent_flow_db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  talent_flow_db:
    container_name: talent_flow_db
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE}
    ports:
      - '${FORWARD_DB_PORT}:3306'
    volumes:
      - talent_flow_data:/var/lib/mysql
    restart: unless-stopped
    command: 
      - --default-authentication-plugin=mysql_native_password
      - --innodb_buffer_pool_size=256M
      - --innodb_log_file_size=128M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  talent_flow_data: